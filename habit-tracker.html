        // Helper: group flat schedule array into weeks
        function groupScheduleIntoWeeks(flatSchedule, totalWeeks) {
            const weeks = [];
            for (let w = 1; w <= totalWeeks; w++) {
                const weekDays = flatSchedule.filter(d => Math.ceil(d.day / 7) === w);
                if (weekDays.length > 0) {
                    weeks.push({ week: w, days: weekDays });
                }
            }
            return weeks;
        }

        function getScheduleDayDate(startDateStr, dayNum) {
            if (!startDateStr) return null;
            const start = new Date(startDateStr);
            const d = new Date(start);
            d.setDate(d.getDate() + dayNum - 1);
            return d.toISOString().split('T')[0];
        }

        function getCurrentScheduleDay() {
            const config = SCHEDULE_CONFIGS[currentScheduleType];
            const startDate = scheduleData[currentScheduleType].startDate;
            if (!startDate) return null;
            const start = new Date(startDate);
            const today = new Date();
            const diffDays = Math.floor((today - start) / (1000 * 60 * 60 * 24));
            if (diffDays < 0 || diffDays >= config.totalDays) return null;
            return diffDays + 1;
        }

        function saveScheduleStartDate() {
            const date = document.getElementById('schedule-start-date').value;
            if (date) {
                scheduleData[currentScheduleType].startDate = date;
                localStorage.setItem('ht_schedule_' + currentScheduleType, JSON.stringify(scheduleData[currentScheduleType]));
                renderSchedule();
            }
        }

        function isScheduleDayChecked(dayNum) {
            const dateStr = getScheduleDayDate(scheduleData[currentScheduleType].startDate, dayNum);
            if (!dateStr) return false;
            return scheduleChecks[currentScheduleType].includes(dateStr);
        }

        function toggleScheduleDay(dayNum) {
            const dateStr = getScheduleDayDate(scheduleData[currentScheduleType].startDate, dayNum);
            if (!dateStr) return;
            const checks = scheduleChecks[currentScheduleType];
            if (checks.includes(dateStr)) {
                scheduleChecks[currentScheduleType] = checks.filter(d => d !== dateStr);
            } else {
                scheduleChecks[currentScheduleType].push(dateStr);
            }
            localStorage.setItem('ht_schedule_checks_' + currentScheduleType, JSON.stringify(scheduleChecks[currentScheduleType]));

            // 同步到对应习惯
            syncScheduleToHabit(dateStr, scheduleChecks[currentScheduleType].includes(dateStr));

            renderSchedule();
        }

        function syncScheduleToHabit(dateStr, isChecked) {
            const config = SCHEDULE_CONFIGS[currentScheduleType];
            let habit = items.find(i => i.type === 'habit' && i.title === config.habitName);
            if (!habit) {
                // 自动创建习惯
                habit = {
                    id: generateId(),
                    title: config.habitName,
                    type: 'habit',
                    project: config.habitProject,
                    icon: config.habitIcon,
                    color: config.habitColor,
                    frequency: 'daily',
                    weekDays: null,
                    note: config.habitNote,
                    checks: [],
                    createdAt: new Date().toISOString()
                };
                items.push(habit);
                if (!projects.includes(config.habitProject)) projects.push(config.habitProject);
            }
            if (!habit.checks) habit.checks = [];
            if (isChecked) {
                if (!habit.checks.includes(dateStr)) {
                    habit.checks.push(dateStr);
                }
            } else {
                habit.checks = habit.checks.filter(d => d !== dateStr);
            }
            saveData();
            if (currentView === 'items') renderItems();
            if (currentView === 'dashboard') renderDashboard();
            if (currentView === 'calendar') renderCalendar();
        }

        function switchScheduleType(type) {
            currentScheduleType = type;
            localStorage.setItem('ht_current_schedule', type);
            renderScheduleTabs();
            renderSchedule();
        }

        function renderSchedule() {
            const config = SCHEDULE_CONFIGS[currentScheduleType];
            const currentData = scheduleData[currentScheduleType];

            // Update tab styles
            document.querySelectorAll('.schedule-tab-btn').forEach(btn => {
                btn.classList.remove('bg-primary', 'text-white');
                btn.classList.add('bg-gray-200', 'dark:bg-gray-700');
            });
            const activeTab = document.getElementById('schedule-tab-' + currentScheduleType);
            if (activeTab) {
                activeTab.classList.add('bg-primary', 'text-white');
                activeTab.classList.remove('bg-gray-200', 'dark:bg-gray-700');
            }

            // Update title
            document.getElementById('schedule-title').textContent = config.name;

            const startDateInput = document.getElementById('schedule-start-date');
            if (currentData.startDate) {
                startDateInput.value = currentData.startDate;
            } else {
                startDateInput.value = '';
            }

            const currentDay = getCurrentScheduleDay();
            const todayStr = getToday();

            // Group flat schedule into weeks
            const weeks = groupScheduleIntoWeeks(config.schedule, config.totalWeeks);

            // Progress
            let progressText = '未设置开始日期';
            let progressPercent = 0;
            if (currentData.startDate) {
                if (currentDay) {
                    const week = Math.ceil(currentDay / 7);
                    progressText = `第 ${week} 周 / ${config.totalWeeks} 周 · Day ${currentDay}`;
                    progressPercent = Math.round((currentDay / config.totalDays) * 100);
                } else {
                    const start = new Date(currentData.startDate);
                    const today = new Date();
                    if (today < start) {
                        const diff = Math.ceil((start - today) / (1000 * 60 * 60 * 24));
                        progressText = `还有 ${diff} 天开始`;
                    } else {
                        progressText = '课程已完成';
                        progressPercent = 100;
                    }
                }
            }
            document.getElementById('schedule-progress-text').textContent = progressText;
            document.getElementById('schedule-progress-bar').style.width = progressPercent + '%';

            // Today status
            const todayStatus = document.getElementById('schedule-today-status');
            if (currentDay && config.schedule.length > 0) {
                const dayData = config.schedule.find(d => d.day === currentDay);
                if (dayData) {
                    const checked = isScheduleDayChecked(currentDay);
                    todayStatus.innerHTML = `<span class="${checked ? 'text-success' : 'text-primary'}">今日: ${dayData.type}${dayData.desc ? ' (' + dayData.desc + ')' : ''} ${checked ? '✓ 已打卡' : ''}</span>`;
                } else {
                    todayStatus.textContent = '';
                }
            } else {
                todayStatus.textContent = '';
            }

            // Render grid
            const grid = document.getElementById('schedule-grid');
            if (config.schedule.length === 0) {
                grid.innerHTML = '<div class="text-center py-12 text-gray-400"><i class="fas fa-clipboard-list text-4xl mb-3"></i><p>暂无课表数据</p></div>';
                return;
            }

            // Update edit button style
            const editBtn = document.getElementById('schedule-edit-btn');
            if (editBtn) {
                if (scheduleEditMode) {
                    editBtn.classList.add('bg-primary', 'text-white');
                    editBtn.classList.remove('bg-gray-200', 'dark:bg-gray-700', 'text-gray-700', 'dark:text-gray-200');
                } else {
                    editBtn.classList.remove('bg-primary', 'text-white');
                    editBtn.classList.add('bg-gray-200', 'dark:bg-gray-700', 'text-gray-700', 'dark:text-gray-200');
                }
            }

            grid.innerHTML = weeks.map(week => {
                const weekChecked = week.days.filter(d => d.type !== '休息').map(d => isScheduleDayChecked(d.day)).filter(Boolean).length;
                const weekTotal = week.days.filter(d => d.type !== '休息').length;
                const isCurrentWeek = currentDay && Math.ceil(currentDay / 7) === week.week;
                const level = config.getLevel(week.week);
                return `
                    <div class="bg-white dark:bg-gray-800 rounded-2xl p-5 shadow-sm ${isCurrentWeek && !scheduleEditMode ? 'ring-2 ring-primary' : ''}">
                        <div class="flex items-center justify-between mb-4">
                            <div>
                                <h3 class="font-bold text-lg">第 ${week.week} 周</h3>
                                <span class="text-xs text-gray-400">${level}</span>
                            </div>
                            ${!scheduleEditMode ? `
                            <div class="text-sm text-gray-500">
                                <span class="font-medium text-primary">${weekChecked}</span> / ${weekTotal} 完成
                            </div>
                            ` : ''}
                        </div>
                        <div class="space-y-1.5">
                            ${week.days.map(d => {
                                const dateStr = getScheduleDayDate(currentData.startDate, d.day);
                                const isToday = dateStr === todayStr;
                                const checked = isScheduleDayChecked(d.day);
                                const isRest = d.type === '休息';
                                const isPast = dateStr && dateStr < todayStr && !isRest;
                                const isFuture = dateStr && dateStr > todayStr;
                                const showLabel = d.label || ('Day ' + d.day);
                                const dayOfWeek = dateStr ? new Date(dateStr).toLocaleDateString('zh-CN', {weekday: 'short'}) : '';
                                if (scheduleEditMode) {
                                    return `
                                        <div class="flex items-center gap-2 p-2.5 rounded-xl bg-gray-50 dark:bg-gray-700/20">
                                            <div class="w-8 text-center">
                                                <div class="text-[10px] text-gray-400">${dayOfWeek}</div>
                                                <div class="text-xs font-bold text-gray-500">${showLabel}</div>
                                            </div>
                                            <input type="text" value="${d.type}" onchange="updateScheduleDay(${d.day}, this.value)" class="flex-1 px-2 py-1 text-sm rounded-lg border dark:border-gray-600 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-primary">
                                            <button onclick="deleteScheduleDay(${d.day})" class="w-7 h-7 rounded-full flex items-center justify-center text-danger hover:bg-danger/10">

                                            <button onclick="toggleScheduleDay(${d.day})" class="w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 transition-all ${checked ? 'bg-success text-white' : isToday ? 'bg-primary text-white hover:bg-primary/80' : 'bg-gray-200 dark:bg-gray-600 text-gray-400 hover:bg-gray-300'}">

                                            </button>

                                    </div>

                            <button onclick="addScheduleDay(${week.week})" class="mt-3 w-full py-2 rounded-xl border-2 border-dashed border-gray-300 dark:border-gray-600 text-gray-500 hover:border-primary hover:text-primary transition-all text-sm">

                            </button>

                `;

                grid.innerHTML += `
                    <div class="flex gap-2 mt-4">

                            <i class="fas fa-undo mr-1"></i>重置默认

        function toggleScheduleEditMode() {
            scheduleEditMode = !scheduleEditMode;
            renderSchedule();
        }

        function updateScheduleDay(day, newType) {
            const config = SCHEDULE_CONFIGS[currentScheduleType];
            const dayEntry = config.schedule.find(d => d.day === day);
            if (dayEntry) {
                dayEntry.type = newType;
                saveScheduleData();
                renderSchedule();
            }
        }

        function deleteScheduleDay(day) {
            const config = SCHEDULE_CONFIGS[currentScheduleType];
            config.schedule = config.schedule.filter(d => d.day !== day);
            // Re-number days
            config.schedule.forEach((d, i) => {
                d.day = i + 1;
                d.label = 'Day ' + (i + 1);
            });
            saveScheduleData();
            renderSchedule();
        }

        function addScheduleDay(weekIndex) {
            const config = SCHEDULE_CONFIGS[currentScheduleType];
            const newDay = config.schedule.length + 1;
            config.schedule.push({ day: newDay, type: '新内容', label: 'Day ' + newDay, desc: '' });
            saveScheduleData();
            renderSchedule();
        }

        function saveScheduleData() {
            const config = SCHEDULE_CONFIGS[currentScheduleType];
            localStorage.setItem('ht_schedule_custom_' + currentScheduleType, JSON.stringify(config.schedule));
        }

        function resetScheduleData() {
            if (confirm('确定要重置为默认课表吗？所有自定义修改将丢失。')) {
                localStorage.removeItem('ht_schedule_custom_' + currentScheduleType);
                location.reload();
            }
        }

        // Custom schedules management
        function loadCustomSchedules() {
            const custom = localStorage.getItem('ht_custom_schedules');
            if (custom) {
                const schedules = JSON.parse(custom);
                schedules.forEach(s => {
                    SCHEDULE_CONFIGS[s.id] = s.config;
                });
            }
        }

        function saveCustomSchedules() {
            const custom = Object.entries(SCHEDULE_CONFIGS)
                .filter(([k, v]) => !['exercise', 'english', 'finance'].includes(k))
                .map(([k, v]) => ({ id: k, config: v }));
            localStorage.setItem('ht_custom_schedules', JSON.stringify(custom));
        }

        function openNewScheduleModal() {
            document.getElementById('new-schedule-modal').classList.remove('hidden');
        }

        function closeNewScheduleModal() {
            document.getElementById('new-schedule-modal').classList.add('hidden');
            document.getElementById('new-schedule-name').value = '';
            document.getElementById('new-schedule-icon').value = 'fa-star';
            document.getElementById('new-schedule-days').value = '30';
            document.getElementById('new-schedule-habit').value = '';
        }

        function createNewSchedule() {
            const name = document.getElementById('new-schedule-name').value.trim();
            const icon = document.getElementById('new-schedule-icon').value.trim() || 'fa-star';
            const days = parseInt(document.getElementById('new-schedule-days').value) || 30;
            const habitName = document.getElementById('new-schedule-habit').value.trim();

            if (!name) {
                alert('请输入课表名称');
                return;
            }

            const id = 'custom_' + Date.now();
            const weeks = Math.ceil(days / 7);

            SCHEDULE_CONFIGS[id] = {
                name: name,
                icon: icon,
                habitName: habitName || name,
                habitProject: '自定义',
                habitIcon: icon,
                habitColor: '#6366f1',
                habitNote: name + '自动同步',
                totalDays: days,
                totalWeeks: weeks,
                getLevel: (week) => '第 ' + week + ' 周',
                schedule: Array.from({length: days}, (_, i) => ({
                    day: i + 1,
                    type: 'Day ' + (i + 1),
                    label: 'Day ' + (i + 1),
                    desc: ''
                }))
            };

            // Initialize data
            scheduleData[id] = JSON.parse(localStorage.getItem('ht_schedule_' + id) || '{}');
            scheduleChecks[id] = JSON.parse(localStorage.getItem('ht_schedule_checks_' + id) || '[]');

            saveCustomSchedules();
            closeNewScheduleModal();
            renderScheduleTabs();
            switchScheduleType(id);
        }

        function deleteCustomSchedule(id) {
            if (!confirm('确定要删除课表「' + SCHEDULE_CONFIGS[id].name + '」吗？')) return;
            delete SCHEDULE_CONFIGS[id];
            delete scheduleData[id];
            delete scheduleChecks[id];
            localStorage.removeItem('ht_schedule_' + id);
            localStorage.removeItem('ht_schedule_checks_' + id);
            localStorage.removeItem('ht_schedule_custom_' + id);
            saveCustomSchedules();
            renderScheduleTabs();
            switchScheduleType('exercise');
        }

        function renderScheduleTabs() {
            const container = document.getElementById('schedule-tabs');
            if (!container) return;

            let html = '';
            Object.entries(SCHEDULE_CONFIGS).forEach(([id, config]) => {
                html += `
                    <button onclick="switchScheduleType('${id}')" id="schedule-tab-${id}" class="schedule-tab-btn px-4 py-2 rounded-xl bg-gray-200 dark:bg-gray-700 text-sm whitespace-nowrap transition-all">
                        <i class="fas ${config.icon} mr-1"></i>${config.name}
                    </button>
                `;
            });
            html += `
                <button onclick="openNewScheduleModal()" class="schedule-tab-btn px-3 py-2 rounded-xl bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-sm whitespace-nowrap transition-all">
                    <i class="fas fa-plus"></i>
                </button>
            `;
            container.innerHTML = html;
        }

        function openScheduleSettings() {
            const currentData = scheduleData[currentScheduleType];
            const startDate = currentData.startDate || '';
            const newDate = prompt('设置课程开始日期（YYYY-MM-DD）：', startDate);
            if (newDate && /^\d{4}-\d{2}-\d{2}$/.test(newDate)) {
                scheduleData[currentScheduleType].startDate = newDate;
                localStorage.setItem('ht_schedule_' + currentScheduleType, JSON.stringify(scheduleData[currentScheduleType]));
                document.getElementById('schedule-start-date').value = newDate;
                renderSchedule();
            }
        }

        // ==================== Utilities ====================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ==================== Init ====================
        document.addEventListener('DOMContentLoaded', function() {
            migrateData();

            // Load custom schedule if exists
            ['exercise', 'english', 'finance'].forEach(type => {
                const custom = localStorage.getItem('ht_schedule_custom_' + type);
                if (custom) {
                    SCHEDULE_CONFIGS[type].schedule = JSON.parse(custom);
                }
            });

            // Load and init custom schedules
            loadCustomSchedules();

                    scheduleData[type] = JSON.parse(localStorage.getItem('ht_schedule_' + type) || '{}');

                    console.log('Service Worker 注册失败:', err.message);
                });

        });

        // ==================== 五年日记 - UI逻辑 ====================

        let selectedMood = '';
        let diaryTab = 'fiveyear';

        function openDiaryNotebookModal() {
            document.getElementById('diary-notebook-modal').classList.remove('hidden');

        }

        async function renderDiaryNotebooks() {
            const grid = document.getElementById('diary-notebook-grid');
            const notebooks = await getNotebooks();
            
            if (notebooks.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-12 text-gray-400"><i class="fas fa-book-open text-4xl mb-3 block"></i>还没有日记本<br>点击右上角「新建日记本」开始记录</div>';

                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 rounded-xl bg-primary/10 flex items-center justify-center text-primary"><i class="fas fa-book"></i></div>

            document.getElementById('diary-notebook-title').textContent = nb ? nb.name : '日记';

            document.getElementById('diary-notebook-view').classList.remove('hidden');
            switchDiaryTab('fiveyear');

        function closeDiaryNotebook() {

            document.getElementById('diary-notebooks-view').classList.remove('hidden');
            document.getElementById('diary-notebook-view').classList.add('hidden');

        async function deleteDiaryNotebook() {
            if (!confirm('确定要删除这个日记本吗？所有日记将永久丢失！')) return;
            if (!currentDiaryId) return;
            document.getElementById('diary-notebook-view').classList.add('hidden');

            currentDiaryId = null;

        function switchDiaryTab(tab) {
            diaryTab = tab;
            document.getElementById('diary-tab-fiveyear').className = 'px-4 py-2 rounded-xl ' + (tab === 'fiveyear' ? 'bg-primary text-white' : 'bg-gray-200 dark:bg-gray-700') + ' text-sm transition-all';
            document.getElementById('diary-tab-timeline').className = 'px-4 py-2 rounded-xl ' + (tab === 'timeline' ? 'bg-primary text-white' : 'bg-gray-200 dark:bg-gray-700') + ' text-sm transition-all';
            document.getElementById('diary-fiveyear-view').classList.toggle('hidden', tab !== 'fiveyear');
            document.getElementById('diary-timeline-view').classList.toggle('hidden', tab !== 'timeline');
            
            if (tab === 'fiveyear' && currentDiaryId) renderFiveYearView();
            if (tab === 'timeline' && currentDiaryId) renderTimelineView();
        }

        async function renderFiveYearView() {
            const grid = document.getElementById('diary-fiveyear-grid');
            if (!currentDiaryId) return;
            
            const entries = await getEntries(currentDiaryId);
            const now = new Date();
            const today = now.getDate();
            const thisMonth = now.getMonth() + 1;
            
            // 获取日记本创建年份
            const notebooks = await getNotebooks();
            const nb = notebooks.find(n => n.id === currentDiaryId);
            const createdYear = nb ? parseInt(nb.createdAt.split('-')[0]) : now.getFullYear();
            
            // 显示创建年 + 未来4年
            const years = [];
            for (let i = 0; i < 5; i++) {
                years.push(createdYear + i);
            }
            
            // 构建月份天数
            const daysInMonth = new Date(now.getFullYear(), thisMonth, 0).getDate();
            
            // 构建查找表: key = "YYYY-MM-DD"
            const entryMap = {};
            entries.forEach(e => { entryMap[e.date] = e; });
            
            // 5列年份头部
            let html = `<div class="mb-4"><div class="text-sm font-medium text-gray-500 mb-2">${createdYear} - ${createdYear + 4} · ${thisMonth}月</div>`;
            html += `<div class="grid grid-cols-5 gap-1">`;
            years.forEach(y => {
                html += `<div class="text-xs font-bold text-center ${y === now.getFullYear() ? 'text-primary' : 'text-gray-500'} pb-1">${y}</div>`;
            });
            html += `</div>`;
            
            // 每天一行
            for (let d = 1; d <= daysInMonth; d++) {
                html += `<div class="grid grid-cols-5 gap-1 mb-1">`;
                years.forEach(y => {
                    const dateStr = `${y}-${String(thisMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const entry = entryMap[dateStr];
                    const isToday = y === now.getFullYear() && d === today;
                    
                    if (entry) {
                        const mood = MOOD_CONFIG[entry.mood] || { emoji: '📝', color: '#6366f1' };
                        let thumb = '';
                        if (entry.thumbnail) {
                            // Show smaller thumbnail
                            thumb = `<img src="${entry.thumbnail}" class="w-4 h-4 rounded object-cover inline-block ml-0.5">`;
                        }
                        html += `<div onclick="openDiaryEntry('${dateStr}')" class="flex items-center gap-0.5 px-1.5 py-1 rounded-lg cursor-pointer transition-all hover:shadow-sm" style="background: ${mood.color}15; border: 1px solid ${isToday ? '#6366f1' : 'transparent'}">
                            <span class="text-xs">${mood.emoji}</span>
                            ${thumb}
                        </div>`;
                    } else {
                        html += `<div onclick="openDiaryEntry('${dateStr}')" class="flex items-center justify-center px-1.5 py-1 rounded-lg cursor-pointer transition-all hover:bg-gray-100 dark:hover:bg-gray-700 ${isToday ? 'ring-2 ring-primary ring-inset' : 'bg-gray-50 dark:bg-gray-700/30'}">
                            <span class="text-[10px] text-gray-400">${d}</span>
                        </div>`;
                    }
                });
                html += `</div>`;
            }
            html += `</div>`;
            grid.innerHTML = html;
        }

        async function renderTimelineView() {
            const list = document.getElementById('diary-timeline-list');
            if (!currentDiaryId) return;
            
            const entries = await getRecentEntries(currentDiaryId, 30);
            
            if (entries.length === 0) {
                list.innerHTML = '<div class="text-center py-12 text-gray-400"><i class="fas fa-book-open text-4xl mb-3 block"></i>近一月暂无日记</div>';
                return;
            }
            
            list.innerHTML = entries.map(e => {
                const mood = MOOD_CONFIG[e.mood] || { emoji: '📝', color: '#6366f1' };
                const weatherIcon = WEATHER_ICONS[e.weather] || '';
                const date = new Date(e.date);
                const dateLabel = date.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', weekday: 'short' });
                
                let photoHtml = '';
                if (e.thumbnail) {
                    photoHtml = `<div onclick="viewDiaryPhoto('${e.id}')" class="mt-2 cursor-pointer">
                        <img src="${e.thumbnail}" class="max-h-20 rounded-xl object-cover border dark:border-gray-700">
                    </div>`;
                }
                
                let tagsHtml = '';
                if (e.tags && e.tags.length > 0) {
                    tagsHtml = `<div class="flex gap-1 mt-1 flex-wrap">${e.tags.map(t => `<span class="text-xs px-2 py-0.5 rounded-full bg-primary/10 text-primary">#${t}</span>`).join('')}</div>`;
                }
                
                return `
                <div onclick="openDiaryEntry('${e.date}', '${e.id}')" class="bg-white dark:bg-gray-800 rounded-2xl p-4 shadow-sm mb-3 cursor-pointer hover:shadow-md transition-all border border-gray-100 dark:border-gray-700">
                    <div class="flex items-center gap-2 mb-2">
                        <span style="font-size:1.2rem">${mood.emoji}</span>
                        <span class="text-xs font-medium" style="color:${mood.color}">${mood.label}</span>
                        ${weatherIcon ? `<span class="text-xs">${weatherIcon} ${e.weather}</span>` : ''}
                        ${e.location ? `<span class="text-xs text-gray-400">📍${e.location}</span>` : ''}
                        <span class="text-xs text-gray-400 ml-auto">${dateLabel}</span>
                    </div>
                    <div class="text-sm text-gray-600 dark:text-gray-300 line-clamp-2">${e.content || '无内容'}</div>
                    ${photoHtml}
                    ${tagsHtml}
                </div>`;
            }).join('');
        }

        function selectMood(mood) {
            selectedMood = (selectedMood === mood) ? '' : mood;
            document.querySelectorAll('.mood-btn').forEach(btn => {
                const isSelected = btn.dataset.mood === selectedMood;
                btn.classList.toggle('ring-2', isSelected);
                btn.classList.toggle('ring-primary', isSelected);
                btn.classList.toggle('bg-primary/5', isSelected);
            });
        }

        function handleDiaryPhoto(input) {
            const file = input.files[0];
            if (!file) return;
            
            // 生成缩略图
            compressImage(file, 200, 200, 0.7).then(thumb => {
                document.getElementById('diary-editor-thumbnail-data').value = thumb;
            });
            
            // 生成预览图（中等质量）
            compressImage(file, 800, 800, 0.8).then(photo => {
                document.getElementById('diary-editor-photo-data').value = photo;
                document.getElementById('diary-editor-photo-img').src = photo;
                document.getElementById('diary-editor-photo-preview').classList.remove('hidden');
                document.getElementById('diary-editor-photo-clear').classList.remove('hidden');
            });
        }

        function clearDiaryPhoto() {
            document.getElementById('diary-editor-photo-data').value = '';
            document.getElementById('diary-editor-thumbnail-data').value = '';
            document.getElementById('diary-editor-photo').value = '';
            document.getElementById('diary-editor-photo-preview').classList.add('hidden');
            document.getElementById('diary-editor-photo-clear').classList.add('hidden');
        }

        async function openDiaryEntry(dateStr, existingId) {
            document.getElementById('diary-editor-title').textContent = existingId ? '编辑日记' : '写日记';
            document.getElementById('diary-editor-date').value = dateStr;
            document.getElementById('diary-editor-entry-id').value = existingId || '';
            selectedMood = '';
            document.querySelectorAll('.mood-btn').forEach(b => { b.classList.remove('ring-2', 'ring-primary', 'bg-primary/5'); });
            document.getElementById('diary-editor-weather').value = '';
            document.getElementById('diary-editor-location').value = '';
            document.getElementById('diary-editor-content').value = '';
            document.getElementById('diary-editor-tags').value = '';
            clearDiaryPhoto();
            
            if (existingId) {
                const entry = await getEntry(parseInt(existingId));
                if (entry) {
                    document.getElementById('diary-editor-entry-id').value = entry.id;
                    if (entry.mood) { selectMood(entry.mood); }
                    document.getElementById('diary-editor-weather').value = entry.weather || '';
                    document.getElementById('diary-editor-location').value = entry.location || '';
                    document.getElementById('diary-editor-content').value = entry.content || '';
                    document.getElementById('diary-editor-tags').value = (entry.tags || []).join(', ');
                    if (entry.thumbnail) {
                        document.getElementById('diary-editor-thumbnail-data').value = entry.thumbnail;
                        document.getElementById('diary-editor-photo-data').value = entry.photo || entry.thumbnail;
                        document.getElementById('diary-editor-photo-img').src = entry.thumbnail;
                        document.getElementById('diary-editor-photo-preview').classList.remove('hidden');
                    }
                }
            }
            
            document.getElementById('diary-editor-modal').classList.remove('hidden');
        }

        function closeDiaryEditor() {
            document.getElementById('diary-editor-modal').classList.add('hidden');
        }

        async function saveDiaryEntry() {
            const date = document.getElementById('diary-editor-date').value;
            const content = document.getElementById('diary-editor-content').value.trim();
            const entryId = document.getElementById('diary-editor-entry-id').value;
            
            if (!date) { alert('请选择日期'); return; }
            
            const tags = document.getElementById('diary-editor-tags').value.split(',').map(t => t.trim()).filter(Boolean);
            
            const entryData = {
                date: date,
                mood: selectedMood,
                weather: document.getElementById('diary-editor-weather').value,
                location: document.getElementById('diary-editor-location').value,
                content: content,
                photo: document.getElementById('diary-editor-photo-data').value || null,
                thumbnail: document.getElementById('diary-editor-thumbnail-data').value || null,
                tags: tags
            };
            
            if (entryId) {
                entryData.id = parseInt(entryId);
            }
            
            await saveEntry(currentDiaryId, entryData);
            closeDiaryEditor();
            
            if (diaryTab === 'fiveyear') renderFiveYearView();
            else renderTimelineView();
        }

        function viewDiaryPhoto(entryId) {
            // Fetch entry and show full photo
            getEntry(parseInt(entryId)).then(entry => {
                if (entry && entry.photo) {
                    document.getElementById('diary-photo-viewer-img').src = entry.photo;
                    document.getElementById('diary-photo-viewer').classList.remove('hidden');
                }
            });
        }

        // Search
        let searchTimeout;
        function searchDiary(val) {
            clearTimeout(searchTimeout);
            const resultsDiv = document.getElementById('diary-search-results');
            if (!val.trim()) { resultsDiv.classList.add('hidden'); return; }
            
            searchTimeout = setTimeout(async () => {
                if (!currentDiaryId) return;
                const results = await searchEntries(currentDiaryId, val);
                
                if (results.length === 0) {
                    resultsDiv.innerHTML = '<div class="text-sm text-gray-400 py-4 text-center">未找到匹配的日记</div>';
                } else {
                    resultsDiv.innerHTML = '<div class="text-xs text-gray-400 mb-2">找到 ' + results.length + ' 篇</div>' +
                        results.slice(0, 20).map(e => {
                            const mood = MOOD_CONFIG[e.mood] || { emoji: '📝' };
                            return `<div onclick="openDiaryEntry('${e.date}', '${e.id}'); document.getElementById('diary-search-input').value=''; document.getElementById('diary-search-results').classList.add('hidden');" class="flex items-center gap-2 p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer text-sm">
                                <span>${mood.emoji}</span>
                                <span class="text-gray-500 text-xs">${e.date}</span>
                                <span class="truncate flex-1">${e.content || '无内容'}</span>
                            </div>`;
                        }).join('');
                }
                resultsDiv.classList.remove('hidden');
            }, 300);
        }

        // Export
        async function exportDiaryNotebook() {
            if (!currentDiaryId) return;
            const notebooks = await getNotebooks();
            const nb = notebooks.find(n => n.id === currentDiaryId);
            const entries = await getEntries(currentDiaryId);
            
            const data = {
                name: nb ? nb.name : '未命名',
                exportedAt: new Date().toISOString(),
                totalEntries: entries.length,
                entries: entries.map(e => ({
                    date: e.date,
                    mood: e.mood,
                    weather: e.weather,
                    location: e.location,
                    content: e.content,
                    tags: e.tags
                }))
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `五年日记_${nb ? nb.name : '备份'}_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

// ==================== 书架 - UI逻辑 ====================
let bookTab = 'reading';
let selectedBookRating = 0;

function switchBookTab(tab) {
    bookTab = tab;
    ['reading', 'to_read', 'finished'].forEach(t => {
        const btn = document.getElementById('book-tab-' + t);
        btn.className = 'px-4 py-2 rounded-xl ' + (t === tab ? 'bg-primary text-white' : 'bg-gray-200 dark:bg-gray-700') + ' text-sm';
    });
    renderBookshelf();
}

async function renderBookshelf() {
    const list = document.getElementById('bookshelf-list');
    const books = await getBooksByStatus(bookTab);
    
    if (books.length === 0) {
        const cfg = BOOK_STATUS_CONFIG[bookTab];
        list.innerHTML = `<div class="text-center py-12 text-gray-400"><i class="fas ${cfg.icon} text-4xl mb-3 block"></i>暂无${cfg.label}的书籍</div>`;
        return;
    }
    
    list.innerHTML = books.map(b => {
        const cat = BOOK_CATEGORIES[b.category] || BOOK_CATEGORIES['其他'];
        const progress = b.totalPages > 0 ? Math.round(b.currentPage / b.totalPages * 100) : 0;
        const stars = b.rating > 0 ? '★'.repeat(b.rating) + '☆'.repeat(5 - b.rating) : '';
        
        return `
        <div class="bg-white dark:bg-gray-800 rounded-2xl p-4 shadow-sm mb-3 hover:shadow-md transition-all cursor-pointer border border-gray-100 dark:border-gray-700" onclick="openBookDetail(${b.id})">
            <div class="flex items-start gap-3">
                <div class="w-10 h-14 rounded-lg flex items-center justify-center text-white flex-shrink-0" style="background: ${cat.color}">
                    <i class="fas ${cat.icon}"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <div class="font-semibold truncate">${escapeHtml(b.title)}</div>
                    <div class="text-xs text-gray-400">${escapeHtml(b.author)} · ${b.category}</div>
                    ${b.status === 'reading' ? `
                        <div class="mt-2">
                            <div class="flex justify-between text-xs text-gray-500 mb-1">
                                <span>${b.currentPage}/${b.totalPages} 页</span>
                                <span>${progress}%</span>
                            </div>
                            <div class="h-1.5 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                                <div class="h-full bg-primary rounded-full transition-all" style="width: ${progress}%"></div>
                            </div>
                        </div>
                    ` : ''}
                    ${b.status === 'finished' && stars ? `<div class="text-xs text-warning mt-1">${stars}</div>` : ''}
                    ${b.review ? `<div class="text-xs text-gray-500 mt-1 truncate">"${escapeHtml(b.review)}"</div>` : ''}
                </div>
                <div class="flex gap-1 flex-shrink-0">
                    ${b.status === 'reading' ? `<button onclick="event.stopPropagation(); quickLogReading(${b.id})" class="w-8 h-8 rounded-lg bg-primary/10 text-primary flex items-center justify-center text-xs hover:bg-primary/20" title="记录阅读"><i class="fas fa-plus"></i></button>` : ''}
                    <button onclick="event.stopPropagation(); editBook(${b.id})" class="w-8 h-8 rounded-lg bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-xs hover:bg-gray-200"><i class="fas fa-pen"></i></button>
                </div>
            </div>
        </div>`;
    }).join('');
}

function openAddBookModal() {
    document.getElementById('add-book-modal-title').textContent = '添加书籍';
    document.getElementById('book-title').value = '';
    document.getElementById('book-author').value = '';
    document.getElementById('book-category').value = '小说';
    document.getElementById('book-status').value = 'to_read';
    document.getElementById('book-total-pages').value = '';
    document.getElementById('book-current-page').value = '0';
    document.getElementById('book-review').value = '';
    document.getElementById('book-edit-id').value = '';
    selectedBookRating = 0;
    updateRatingStars();
    document.getElementById('add-book-modal').classList.remove('hidden');
}

function closeAddBookModal() {
    document.getElementById('add-book-modal').classList.add('hidden');
}

function setBookRating(n) {
    selectedBookRating = (selectedBookRating === n) ? 0 : n;
    document.getElementById('book-rating-value').value = selectedBookRating;
    updateRatingStars();
}

function updateRatingStars() {
    document.querySelectorAll('#book-rating-stars button').forEach(btn => {
        const star = parseInt(btn.dataset.star);
        btn.classList.toggle('text-warning', star <= selectedBookRating);
        btn.classList.toggle('text-gray-300', star > selectedBookRating);
    });
}

async function editBook(id) {
    const book = await getBook(id);
    if (!book) return;
    document.getElementById('add-book-modal-title').textContent = '编辑书籍';
    document.getElementById('book-title').value = book.title;
    document.getElementById('book-author').value = book.author;
    document.getElementById('book-category').value = book.category;
    document.getElementById('book-status').value = book.status;
    document.getElementById('book-total-pages').value = book.totalPages || '';
    document.getElementById('book-current-page').value = book.currentPage || 0;
    document.getElementById('book-review').value = book.review || '';
    document.getElementById('book-edit-id').value = book.id;
    selectedBookRating = book.rating || 0;
    document.getElementById('book-rating-value').value = selectedBookRating;
    updateRatingStars();
    document.getElementById('add-book-modal').classList.remove('hidden');
}

async function saveBook() {
    const title = document.getElementById('book-title').value.trim();
    if (!title) { alert('请输入书名'); return; }
    
    const editId = document.getElementById('book-edit-id').value;
    const data = {
        title: title,
        author: document.getElementById('book-author').value.trim(),
        category: document.getElementById('book-category').value,
        status: document.getElementById('book-status').value,
        totalPages: parseInt(document.getElementById('book-total-pages').value) || 0,
        currentPage: parseInt(document.getElementById('book-current-page').value) || 0,
        rating: selectedBookRating,
        review: document.getElementById('book-review').value.trim()
    };
    
    if (editId) {
        await updateBook(parseInt(editId), data);
    } else {
        if (data.status === 'reading') data.startedAt = new Date().toISOString();
        if (data.status === 'finished') data.finishedAt = new Date().toISOString();
        await addBook(data);
    }
    
    closeAddBookModal();
    renderBookshelf();
}

async function quickLogReading(bookId) {
    const pages = prompt('今天读了多少页？（留空记为0页）');
    if (pages === null) return;
    await logReading(bookId, parseInt(pages) || 0);
    renderBookshelf();
    renderDashboard();
}

// ==================== 书籍详情 + 笔记 ====================
async function openBookDetail(id) {
    const book = await getBook(id);
    if (!book) return;
    const notes = await getBookNotes(id);
    const cat = BOOK_CATEGORIES[book.category] || BOOK_CATEGORIES['其他'];
    const progress = book.totalPages > 0 ? Math.round(book.currentPage / book.totalPages * 100) : 0;
    const stars = book.rating > 0 ? '★'.repeat(book.rating) + '☆'.repeat(5 - book.rating) : '';
    
    document.getElementById('book-detail-title').textContent = book.title;
    
    let html = `
        <div class="flex items-center gap-3 mb-4">
            <div class="w-12 h-16 rounded-lg flex items-center justify-center text-white" style="background: ${cat.color}">
                <i class="fas ${cat.icon} text-lg"></i>
            </div>
            <div>
                <div class="font-bold">${escapeHtml(book.title)}</div>
                <div class="text-sm text-gray-400">${escapeHtml(book.author)} · ${book.category}</div>
                <div class="text-xs mt-1"><span class="px-2 py-0.5 rounded-full text-white text-xs" style="background: ${BOOK_STATUS_CONFIG[book.status].color}">${BOOK_STATUS_CONFIG[book.status].label}</span></div>
            </div>
        </div>
        ${book.status === 'reading' ? `
            <div class="mb-4">
                <div class="flex justify-between text-sm mb-1"><span>阅读进度</span><span>${book.currentPage}/${book.totalPages} 页 (${progress}%)</span></div>
                <div class="h-2 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden"><div class="h-full bg-primary rounded-full" style="width: ${progress}%"></div></div>
            </div>
        ` : ''}
        ${stars ? `<div class="text-warning mb-2">${stars}</div>` : ''}
        ${book.review ? `<div class="text-sm text-gray-600 dark:text-gray-300 mb-4 italic">"${escapeHtml(book.review)}"</div>` : ''}
        <div class="flex gap-2 mb-4">
            <button onclick="editBook(${book.id}); closeBookDetail();" class="flex-1 py-2 rounded-xl bg-gray-100 dark:bg-gray-700 text-sm"><i class="fas fa-pen mr-1"></i>编辑</button>
            ${book.status === 'reading' ? `<button onclick="quickLogReading(${book.id}); closeBookDetail();" class="flex-1 py-2 rounded-xl bg-primary text-white text-sm"><i class="fas fa-book-open mr-1"></i>记录阅读</button>` : ''}
            <button onclick="deleteBookConfirm(${book.id})" class="py-2 px-4 rounded-xl bg-danger/10 text-danger text-sm"><i class="fas fa-trash"></i></button>
        </div>
        <hr class="dark:border-gray-700 mb-4">
        <div class="flex justify-between items-center mb-3">
            <h4 class="font-semibold">阅读笔记 (${notes.length})</h4>
        </div>
        <div class="mb-3">
            <textarea id="new-note-content" rows="2" class="w-full px-4 py-2.5 rounded-xl border dark:border-gray-700 dark:bg-gray-800 text-sm resize-none" placeholder="写一条笔记..."></textarea>
            <button onclick="saveBookNote(${book.id})" class="mt-2 w-full py-2 rounded-xl bg-primary text-white text-sm"><i class="fas fa-plus mr-1"></i>添加笔记</button>
        </div>
        <div class="space-y-2">
            ${notes.length === 0 ? '<p class="text-sm text-gray-400 text-center py-4">暂无笔记</p>' : 
                notes.map(n => `
                    <div class="bg-gray-50 dark:bg-gray-700/30 rounded-xl p-3">
                        <div class="text-sm">${escapeHtml(n.content)}</div>
                        <div class="text-[10px] text-gray-400 mt-1">${new Date(n.createdAt).toLocaleDateString('zh-CN')}</div>
                        <button onclick="deleteBookNoteConfirm(${n.id}, ${book.id})" class="text-[10px] text-danger mt-1"><i class="fas fa-times mr-0.5"></i>删除</button>
                    </div>
                `).join('')}
        </div>
    `;
    
    document.getElementById('book-detail-content').innerHTML = html;
    document.getElementById('book-detail-modal').classList.remove('hidden');
}

function closeBookDetail() {
    document.getElementById('book-detail-modal').classList.add('hidden');
}

async function saveBookNote(bookId) {
    const content = document.getElementById('new-note-content').value.trim();
    if (!content) return;
    await addBookNote(bookId, content);
    openBookDetail(bookId);
}

async function deleteBookNoteConfirm(noteId, bookId) {
    if (!confirm('删除这条笔记？')) return;
    await deleteBookNote(noteId);
    openBookDetail(bookId);
}

async function deleteBookConfirm(id) {
    if (!confirm('确定要删除这本书吗？相关笔记也会被删除。')) return;
    await deleteBook(id);
    closeBookDetail();
    renderBookshelf();
}

// ==================== 年度统计 ====================
async function openBookshelfStats() {
    const year = new Date().getFullYear().toString();
    const stats = await getYearlyStats(year);
    
    const catEntries = Object.entries(stats.categoryMap).sort((a, b) => b[1] - a[1]);
    const monthEntries = Object.entries(stats.monthlyMap).sort();
    
    let html = `
        <div class="text-center mb-4">
            <div class="text-3xl font-bold text-primary">${stats.totalFinished}</div>
            <div class="text-sm text-gray-400">本年已完成</div>
        </div>
        <div class="grid grid-cols-3 gap-3 mb-4">
            <div class="bg-gray-50 dark:bg-gray-700/30 rounded-xl p-3 text-center">
                <div class="text-lg font-bold">${stats.totalReading}</div>
                <div class="text-[10px] text-gray-400">阅读中</div>
            </div>
            <div class="bg-gray-50 dark:bg-gray-700/30 rounded-xl p-3 text-center">
                <div class="text-lg font-bold">${stats.totalPages}</div>
                <div class="text-[10px] text-gray-400">总页数</div>
            </div>
            <div class="bg-gray-50 dark:bg-gray-700/30 rounded-xl p-3 text-center">
                <div class="text-lg font-bold">${stats.avgRating}</div>
                <div class="text-[10px] text-gray-400">均分</div>
            </div>
        </div>
        ${catEntries.length > 0 ? `
            <h4 class="font-semibold text-sm mb-2">阅读类型分布</h4>
            <div class="space-y-1.5 mb-4">
                ${catEntries.map(([cat, count]) => {
                    const c = BOOK_CATEGORIES[cat] || BOOK_CATEGORIES['其他'];
                    const pct = Math.round(count / stats.totalFinished * 100);
                    return `<div class="flex items-center gap-2 text-sm">
                        <i class="fas ${c.icon} w-4" style="color: ${c.color}"></i>
                        <span class="w-12">${cat}</span>
                        <div class="flex-1 h-1.5 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden"><div class="h-full rounded-full" style="width: ${pct}%; background: ${c.color}"></div></div>
                        <span class="text-xs text-gray-400 w-8 text-right">${count}本</span>
                    </div>`;
                }).join('')}
            </div>
        ` : ''}
        ${monthEntries.length > 0 ? `
            <h4 class="font-semibold text-sm mb-2">月度完成</h4>
            <div class="space-y-1.5">
                ${monthEntries.map(([month, count]) => `
                    <div class="flex items-center gap-2 text-sm">
                        <span class="w-16 text-xs">${month}</span>
                        <div class="flex-1 h-1.5 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden"><div class="h-full bg-primary rounded-full" style="width: ${Math.min(count * 20, 100)}%"></div></div>
                        <span class="text-xs text-gray-400 w-8 text-right">${count}本</span>
                    </div>
                `).join('')}
            </div>
        ` : '<p class="text-sm text-gray-400 text-center">本年暂无完成的书籍</p>'}
    `;
    
    document.getElementById('bookshelf-stats-content').innerHTML = html;
    document.getElementById('bookshelf-stats-modal').classList.remove('hidden');
}

function closeBookshelfStats() {
    document.getElementById('bookshelf-stats-modal').classList.add('hidden');
}
